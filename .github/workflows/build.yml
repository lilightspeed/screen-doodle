name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload artifact (onedir)
        uses: actions/upload-artifact@v4
        with:
          name: screen-doodle-windows
          path: dist/screen-doodle/

      - name: Package as zip
        run: |
          cd dist
          powershell Compress-Archive -Path screen-doodle -DestinationPath screen-doodle-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/screen-doodle-windows.zip
